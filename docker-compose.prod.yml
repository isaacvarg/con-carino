# Production deployment.
#
# Deploy:
#   docker network create edge                                    # once
#   docker compose -f docker-compose.prod.yml pull
#   docker compose -f docker-compose.prod.yml run --rm migrate
#   docker compose -f docker-compose.prod.yml up -d
#
# `migrate` sits behind the `tools` profile so `up -d` never starts it, but it
# is still a required step of every deploy that carries a new migration.

services:
  app:
    image: ghcr.io/isaacvarg/con-carino:${IMAGE_TAG:-latest}
    pull_policy: always
    container_name: con-carino-app
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-con_carino}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-con_carino}?schema=public
      AUTH_SECRET: ${AUTH_SECRET}
      # Must include the auth base path (start-authjs derives basePath from
      # AUTH_URL's pathname), e.g. https://enos.thevargas.casa/api/auth
      AUTH_URL: ${AUTH_URL}
      AUTH_TRUST_HOST: 'true'
      AUTH_GOOGLE_ID: ${AUTH_GOOGLE_ID}
      AUTH_GOOGLE_SECRET: ${AUTH_GOOGLE_SECRET}
      AUTH_DISCORD_ID: ${AUTH_DISCORD_ID}
      AUTH_DISCORD_SECRET: ${AUTH_DISCORD_SECRET}
      S3_ENDPOINT: http://rustfs:9000
      S3_REGION: ${S3_REGION:-us-east-1}
      S3_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID}
      S3_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY}
      S3_BUCKET: ${S3_BUCKET:-con-carino}
      S3_FORCE_PATH_STYLE: 'true'
    networks:
      - edge
      - backend
    depends_on:
      rustfs:
        condition: service_started
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:18-alpine
    container_name: con-carino-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-con_carino}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: ${POSTGRES_DB:-con_carino}
    volumes:
      - postgres_data:/var/lib/postgresql
    networks:
      - backend
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'pg_isready -U ${POSTGRES_USER:-con_carino} -d ${POSTGRES_DB:-con_carino}',
        ]
      interval: 10s
      timeout: 5s
      retries: 5

  rustfs:
    image: rustfs/rustfs:latest
    container_name: con-carino-rustfs-prod
    restart: unless-stopped
    environment:
      RUSTFS_ACCESS_KEY: ${S3_ACCESS_KEY_ID}
      RUSTFS_SECRET_KEY: ${S3_SECRET_ACCESS_KEY}
      RUSTFS_ADDRESS: '0.0.0.0:9000'
    volumes:
      - rustfs_data:/data
    command: ['/data']
    networks:
      - backend

  migrate:
    image: ghcr.io/isaacvarg/con-carino-migrate:${IMAGE_TAG:-latest}
    pull_policy: always
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-con_carino}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-con_carino}?schema=public
    networks:
      - backend
    depends_on:
      postgres:
        condition: service_healthy
    profiles:
      - tools

networks:
  edge:
    external: true
  backend:
    internal: true

volumes:
  rustfs_data:
  postgres_data:
