# Production deployment.
#
# Topology:
#   - `edge` is an external, pre-created network shared with the cloudflared
#     Zero Trust tunnel container: docker network create edge
#     The tunnel's public hostname should point at http://app:3000.
#   - `backend` is internal-only: RustFS is reachable from the app but never
#     from the host or the tunnel. Browsers get files through the app's
#     signed /api/files proxy, never from RustFS directly.
#
# Apply migrations: docker compose -f docker-compose.prod.yml run --rm migrate
# Then:             docker compose -f docker-compose.prod.yml up -d

services:
  app:
    build: .
    container_name: con-carino-app
    restart: unless-stopped
    environment:
      DATABASE_URL: ${DATABASE_URL}
      AUTH_SECRET: ${AUTH_SECRET}
      AUTH_TRUST_HOST: 'true'
      AUTH_GOOGLE_ID: ${AUTH_GOOGLE_ID}
      AUTH_GOOGLE_SECRET: ${AUTH_GOOGLE_SECRET}
      AUTH_DISCORD_ID: ${AUTH_DISCORD_ID}
      AUTH_DISCORD_SECRET: ${AUTH_DISCORD_SECRET}
      S3_ENDPOINT: http://rustfs:9000
      S3_REGION: ${S3_REGION:-us-east-1}
      S3_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID}
      S3_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY}
      S3_BUCKET: ${S3_BUCKET:-con-carino}
      S3_FORCE_PATH_STYLE: 'true'
    networks:
      - edge
      - backend
    depends_on:
      - rustfs

  rustfs:
    image: rustfs/rustfs:latest
    container_name: con-carino-rustfs-prod
    restart: unless-stopped
    environment:
      RUSTFS_ACCESS_KEY: ${S3_ACCESS_KEY_ID}
      RUSTFS_SECRET_KEY: ${S3_SECRET_ACCESS_KEY}
      RUSTFS_ADDRESS: '0.0.0.0:9000'
    volumes:
      - rustfs_data:/data
    command: ['/data']
    networks:
      - backend

  migrate:
    build:
      context: .
      target: migrate
    environment:
      DATABASE_URL: ${DATABASE_URL}
    networks:
      - backend
    profiles:
      - tools

networks:
  edge:
    external: true
  backend:
    internal: true

volumes:
  rustfs_data:
